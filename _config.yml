# ============================================
# hexo-theme-shion Configuration
# ============================================

# --- Fonts ---
# Font families and base size. Leave empty to use theme SCSS defaults.
# External font loading (Google Fonts, CDN) must be handled by the user
# via custom_css or injecting <link> tags into the site header.
fonts:
  heading: "'Noto Serif SC', 'Source Han Serif SC', Georgia, serif"
  body: "'Noto Sans SC', Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  code: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace"
  size_root: 15px

# --- Site Identity ---
favicon: /images/shion/favicon.png
logo:
  text: null
  image: null

# --- Navigation Menu ---
menu:
  Home: /
  Archives: /archives/
  Tags: /tags/
  Categories: /categories/
  Friends: /friends/
  About: /about/

# --- Appearance ---
appearance:
  default_mode: auto # auto | light | dark
  font_size: null # [deprecated] Use fonts.size_root instead
  code_theme: auto # auto | light | dark
  reading_progress: true # Show reading progress bar at top of page

# --- Home Page ---
home:
  posts_per_page: 10
  display_excerpt: true
  excerpt_length: 280

# --- Post ---
post:
  toc: true
  toc_max_depth: 3
  copyright: true
  reading_time: true
  word_count: true
  date_format: 'YYYY-MM-DD'
  cover:
    enable: true
    # Post by default uses cover.png inside its own asset folder (post_asset_folder).
    # Set this fallback only for posts without a cover file.
    default: /images/shion/default-cover.png
  share:
    enable: true
    platforms: ['twitter', 'facebook', 'linkedin', 'copy']
  copyright_license: 'CC BY-NC-SA 4.0'
  copyright_license_url: 'https://creativecommons.org/licenses/by-nc-sa/4.0/'
  code:
    highlight: highlight.js
    line_numbers: true
    copy_button: true
  math:
    enable: true
    engine: katex
    delimiters:
      - left: '$$'
        right: '$$'
        display: true
      - left: '$'
        right: '$'
        display: false
  image:
    lazy_load: true
    lightbox: true

# --- Sidebar ---
sidebar:
  enable: true
  position: left # left | right
  profile:
    enable: true
  avatar:
    enable: true
    image: /images/shion/avatar.png
  social:
    GitHub: https://github.com/
  widgets:
    - recent-posts
  recent_posts_count: 5
  tagcloud_min_font: 1.2
  tagcloud_max_font: 2.8

# --- Music Player ---
music:
  enable: false
  playlist: []

# --- Comments ---
comments:
  enable: false
  type: giscus # giscus | disqus | waline | twikoo | valine | gitalk | utterances | none
  giscus:
    repo: ''
    repo_id: ''
    category: ''
    category_id: ''
    mapping: pathname
    strict: false
    reactions_enabled: '1'
    emit_metadata: '0'
    input_position: bottom
    lang: auto
  disqus:
    shortname: ''
  waline:
    serverURL: ''
    lang: auto
  twikoo:
    envId: ''
  valine:
    appId: ''
    appKey: ''
  gitalk:
    clientID: ''
    clientSecret: ''
    repo: ''
    owner: ''
    admin: []
  utterances:
    repo: ''
    issue_term: pathname

# --- Analytics ---
analytics:
  google: null
  baidu: null

# --- Search ---
search:
  enable: true
  type: local

# --- Footer ---
footer:
  since: null
  powered_by: true
  theme_by: true
  icp: null

# --- Shion Theme Character ---
shion:
  hero_enable: true
  hero_image: /images/shion/hero.png
  background_image: /images/shion/bg.png
  404_image: /images/shion/404.png

# --- Outdate Warning ---
outdate:
  enable: true
  days: 365

# --- Busuanzi ---
busuanzi:
  enable: false
  site_uv: true
  site_pv: true

# --- Advanced ---
custom_css: null
custom_js: null
cdn:
  highlightjs: https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11
  katex: https://cdn.jsdelivr.net/npm/katex@0
  fusejs: https://cdn.jsdelivr.net/npm/fuse.js@7
